name: ci

on:
    workflow_dispatch:
        inputs:
            my_input:
                description: "..."
                default: "my secret value"
                required: true

jobs:
    test-1:
        runs-on: ubuntu-latest

        steps:
            - name: test 1 - before masking - direct input usage
              run: echo "should NOT be masked ${{ github.event.inputs.my_input }}"

            - name: test 2 - before masking - indirect input usage with env var
              env:
                  my_input: ${{ github.event.inputs.my_input }}
              run: echo "should NOT be masked ${my_input}"

            - name: mask
              run: echo "::add-mask::${{ github.event.inputs.my_input }}"

            - name: test 3 - after masking - direct input usage
              run: echo "should be masked ${{ github.event.inputs.my_input }}"

            - name: test 4 - after masking - indirect input usage with env var
              env:
                  my_input: ${{ github.event.inputs.my_input }}
              run: echo "should be masked ${my_input}"

    test-2:
        runs-on: ubuntu-latest
        needs: ["test-1"]

        steps:
            - name: test 5 - after masking, different job - direct input usage
              run: echo "should be masked ${{ github.event.inputs.my_input }}"

            - name: test 6 - after masking, different job - indirect input usage with env var
              env:
                  my_input: ${{ github.event.inputs.my_input }}
              run: echo "should be masked ${my_input}"
